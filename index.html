<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>신혼여행 일정표 — 잠금</title>
  <style>
    :root {
      --bg: #fff8f3; --ink: #25212a; --muted: #756b7c; --line: #ead8cf;
      --rose: #ff6b8a; --peach: #ffb37a; --blue: #5a8dee;
      --card: rgba(255,255,255,.86); --shadow: 0 24px 60px rgba(63,39,59,.13);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 12% 8%, rgba(255,107,138,.25), transparent 30%), radial-gradient(circle at 86% 12%, rgba(90,141,238,.20), transparent 32%), linear-gradient(135deg, #fff8f3 0%, #f8fbff 100%);
      padding: 44px 18px;
    }
    main { max-width: 1040px; margin: 0 auto; }
    .lock { max-width: 560px; margin: min(12vh,90px) auto 0; padding: 34px; }
    .lock h1 { margin: 0 0 10px; font-size: clamp(34px, 6vw, 58px); line-height: .98; letter-spacing: -0.05em; }
    .lock p { color: var(--muted); line-height: 1.65; }
    .form { display: flex; gap: 10px; margin-top: 22px; }
    input { flex: 1; min-width: 0; border: 1px solid var(--line); border-radius: 16px; padding: 15px 16px; font: inherit; background: white; }
    button { border: 0; border-radius: 16px; padding: 15px 18px; font: inherit; font-weight: 900; color: white; background: linear-gradient(135deg, var(--rose), var(--peach)); cursor: pointer; }
    .hint { font-size: 13px; color: var(--muted); margin-top: 12px; }
    .error { color: #c2415b; font-weight: 800; min-height: 22px; margin-top: 12px; }
    .hero { display: grid; gap: 18px; margin-bottom: 26px; }
    .eyebrow { color: var(--rose); font-weight: 800; letter-spacing: .12em; font-size: 13px; }
    h1 { margin: 0; font-size: clamp(34px, 6vw, 64px); line-height: .98; letter-spacing: -0.05em; }
    .subtitle { color: var(--muted); font-size: 18px; margin: 0; }
    .panel { background: var(--card); border: 1px solid rgba(255,255,255,.74); border-radius: 30px; box-shadow: var(--shadow); backdrop-filter: blur(14px); overflow: hidden; }
    .route-map { position: relative; display: grid; grid-template-columns: 1fr auto 1fr auto 1fr; gap: 14px; align-items: center; padding: 30px; }
    .stop { min-height: 160px; border-radius: 24px; padding: 22px; background: #fff; border: 1px solid var(--line); }
    .stop small { display: block; color: var(--muted); font-weight: 700; margin-bottom: 9px; }
    .code { font-size: 44px; font-weight: 900; letter-spacing: -0.05em; }
    .city { font-size: 16px; color: var(--muted); margin-top: 2px; }
    .date { margin-top: 18px; font-weight: 800; }
    .time { color: var(--rose); font-weight: 900; margin-top: 3px; }
    .plane { color: var(--blue); font-size: 32px; font-weight: 900; }
    .stay { min-width: 190px; text-align: center; padding: 18px 14px; border-radius: 999px; background: linear-gradient(135deg, rgba(255,107,138,.13), rgba(255,179,122,.16)); border: 1px solid var(--line); font-weight: 900; }
    .cards { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; margin-top: 18px; }
    .flight { padding: 24px; }
    .badge { display: inline-flex; padding: 7px 12px; border-radius: 999px; color: white; font-weight: 900; font-size: 13px; }
    .in { background: linear-gradient(135deg, var(--rose), var(--peach)); }
    .out { background: linear-gradient(135deg, var(--blue), #8a6df1); }
    .flight h2 { margin: 14px 0 8px; font-size: 26px; }
    .meta { display: grid; grid-template-columns: 86px 1fr; gap: 8px 12px; color: var(--muted); }
    .meta b { color: var(--ink); }
    .todo { margin-top: 18px; padding: 24px 28px; }
    .todo h2 { margin: 0 0 12px; }
    ul { margin: 0; padding-left: 21px; color: var(--muted); line-height: 1.8; }
    footer { color: var(--muted); text-align: center; margin-top: 20px; font-size: 13px; }
    @media (max-width: 840px) { .route-map { grid-template-columns: 1fr; } .plane { transform: rotate(90deg); text-align: center; } .stay { border-radius: 24px; } .cards { grid-template-columns: 1fr; } .form { flex-direction: column; } }
  </style>
</head>
<body>
  <main id="app">
    <section class="panel lock">
      <div class="eyebrow">PRIVATE HONEYMOON PAGE</div>
      <h1>신혼여행 일정표</h1>
      <p>공유 링크는 열려 있지만, 세부 일정은 비밀번호를 입력해야 복호화돼서 보여요.</p>
      <form class="form" id="unlockForm">
        <input id="password" type="password" autocomplete="current-password" placeholder="비밀번호" autofocus />
        <button type="submit">열기</button>
      </form>
      <div class="error" id="error" role="alert"></div>
      <div class="hint">※ 정적 페이지라 서버 인증은 아니지만, 세부 내용은 암호화해 소스에 평문으로 두지 않았습니다.</div>
    </section>
  </main>

    const dec = new TextDecoder();
    function b64bytes(s) { return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }
    async function deriveKey(password) {
      const material = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: b64bytes(encrypted.salt), iterations: encrypted.iterations, hash: 'SHA-256' },
        material,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
    }
    document.getElementById('unlockForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const error = document.getElementById('error');
      error.textContent = '';
      try {
        const password = document.getElementById('password').value;
        const key = await deriveKey(password);
        const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64bytes(encrypted.iv) }, key, b64bytes(encrypted.data));
        sessionStorage.setItem('honeymoonPagePassword', password);
        document.getElementById('app').innerHTML = dec.decode(plain);
        if (window.initItineraryPages) window.initItineraryPages();
      } catch (e) {
        error.textContent = '비밀번호가 맞지 않아요.';
      }
    });
    async function trySavedPassword() {
      const saved = sessionStorage.getItem('honeymoonPagePassword');
      if (!saved) return;
      try {
        const key = await deriveKey(saved);
        const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64bytes(encrypted.iv) }, key, b64bytes(encrypted.data));
        document.getElementById('app').innerHTML = dec.decode(plain);
        if (window.initItineraryPages) window.initItineraryPages();
      } catch (e) {
        sessionStorage.removeItem('honeymoonPagePassword');
      }
    }
    trySavedPassword();

    window.initItineraryPages = function () {
      const buttons = Array.from(document.querySelectorAll('[data-page-target]'));
      const pages = Array.from(document.querySelectorAll('[data-page]'));
      function show(name) {
        pages.forEach(page => { page.style.display = page.dataset.page === name ? '' : 'none'; });
        buttons.forEach(btn => { btn.classList.toggle('active', btn.dataset.pageTarget === name); });
      }
      buttons.forEach(btn => btn.addEventListener('click', () => show(btn.dataset.pageTarget)));
      show('overview');
    };
  </script>
