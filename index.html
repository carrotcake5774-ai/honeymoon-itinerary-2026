<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#ff6b8a" />
  <title>신혼여행 일정표 — 잠금</title>
  <style>
    :root {
      --bg: #fff8f3; --ink: #25212a; --muted: #756b7c; --line: #ead8cf;
      --rose: #ff6b8a; --peach: #ffb37a; --blue: #5a8dee;
      --rose-text: #cf2e54; --blue-text: #2f5fc0;
      --card: rgba(255,255,255,.86); --shadow: 0 24px 60px rgba(63,39,59,.13);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 12% 8%, rgba(255,107,138,.25), transparent 30%), radial-gradient(circle at 86% 12%, rgba(90,141,238,.20), transparent 32%), linear-gradient(135deg, #fff8f3 0%, #f8fbff 100%);
      background-attachment: fixed;
      padding: 40px 18px;
    }
    main { max-width: 1040px; margin: 0 auto; }

    /* ---- lock screen ---- */
    .lock { max-width: 560px; margin: min(12vh,90px) auto 0; padding: 34px; }
    .lock h1 { margin: 0 0 10px; font-size: clamp(34px, 6vw, 58px); line-height: .98; letter-spacing: -0.05em; }
    .lock p { color: var(--muted); line-height: 1.65; }
    .form { display: flex; gap: 10px; margin-top: 22px; }
    input { flex: 1; min-width: 0; border: 1px solid var(--line); border-radius: 16px; padding: 15px 16px; font: inherit; background: white; }
    .form button { border: 0; border-radius: 16px; padding: 15px 18px; font: inherit; font-weight: 900; color: white; background: linear-gradient(135deg, var(--rose), var(--peach)); cursor: pointer; }
    .hint { font-size: 13px; color: var(--muted); margin-top: 12px; }
    .error { color: #c2415b; font-weight: 800; min-height: 22px; margin-top: 12px; }

    /* ---- shared content base (used by decrypted payload) ---- */
    .hero { display: grid; gap: 10px; margin-bottom: 22px; }
    .eyebrow { color: var(--rose-text); font-weight: 800; letter-spacing: .12em; font-size: 13px; }
    h1 { margin: 0; font-size: clamp(34px, 6vw, 60px); line-height: .98; letter-spacing: -0.05em; }
    .subtitle { color: var(--muted); font-size: 18px; margin: 0; }
    .panel { background: var(--card); border: 1px solid rgba(255,255,255,.74); border-radius: 26px; box-shadow: var(--shadow); backdrop-filter: blur(14px); overflow: hidden; }
    .cards { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; margin-top: 8px; }
    .flight { padding: 22px; }
    .badge { display: inline-flex; padding: 7px 12px; border-radius: 999px; color: white; font-weight: 900; font-size: 13px; }
    .in { background: linear-gradient(135deg, var(--rose), var(--peach)); }
    .out { background: linear-gradient(135deg, var(--blue), #8a6df1); }
    .flight h3 { margin: 12px 0 4px; font-size: 24px; letter-spacing: -0.02em; }
    .meta { display: grid; grid-template-columns: 92px minmax(0,1fr); gap: 8px 12px; color: var(--muted); margin-top: 10px; }
    .meta b { color: var(--ink); overflow-wrap: anywhere; }
    .todo { padding: 22px 24px; }
    .todo h2 { margin: 0 0 6px; font-size: 20px; }
    ul { margin: 0; padding-left: 21px; color: var(--muted); line-height: 1.8; }
    footer { color: var(--muted); text-align: center; margin-top: 22px; font-size: 13px; }

    @media (max-width: 840px) {
      body { padding: 28px 14px; }
      .cards { grid-template-columns: 1fr; }
      .form { flex-direction: column; }
      .meta { grid-template-columns: 84px minmax(0,1fr); }
    }
  </style>
</head>
<body>
  <main id="app">
    <section class="panel lock">
      <div class="eyebrow">PRIVATE HONEYMOON PAGE</div>
      <h1>신혼여행 일정표</h1>
      <p>공유 링크는 열려 있지만, 세부 일정은 비밀번호를 입력해야 복호화돼서 보여요.</p>
      <form class="form" id="unlockForm">
        <input id="password" type="password" autocomplete="current-password" placeholder="비밀번호" autofocus />
        <button type="submit">열기</button>
      </form>
      <div class="error" id="error" role="alert"></div>
      <div class="hint">※ 정적 페이지라 서버 인증은 아니지만, 세부 내용은 암호화해 소스에 평문으로 두지 않았습니다.</div>
    </section>
  </main>

    };
    const dec = new TextDecoder();
    function b64bytes(s) { return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }
    async function deriveKey(password) {
      const material = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: b64bytes(encrypted.salt), iterations: encrypted.iterations, hash: 'SHA-256' },
        material,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
    }
    async function reveal(password) {
      const key = await deriveKey(password);
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64bytes(encrypted.iv) }, key, b64bytes(encrypted.data));
      document.getElementById('app').innerHTML = dec.decode(plain);
      document.title = '신혼여행 일정표';
      if (window.initItineraryPages) window.initItineraryPages();
    }
    document.getElementById('unlockForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const error = document.getElementById('error');
      error.textContent = '';
      try {
        const password = document.getElementById('password').value;
        await reveal(password);
        sessionStorage.setItem('honeymoonPagePassword', password);
      } catch (e) {
        error.textContent = (window.crypto && window.crypto.subtle)
          ? '비밀번호가 맞지 않아요.'
          : '이 브라우저/환경에서는 복호화를 지원하지 않아요. (HTTPS에서 다시 시도)';
        const pw = document.getElementById('password');
        if (pw) { pw.focus(); pw.select(); }
      }
    });
    (async function trySavedPassword() {
      const saved = sessionStorage.getItem('honeymoonPagePassword');
      if (!saved) return;
      try { await reveal(saved); }
      catch (e) { sessionStorage.removeItem('honeymoonPagePassword'); }
    })();

    /* ============ interactive itinerary (runs after innerHTML inject) ============ */
    window.initItineraryPages = function () {
      const $  = (s, r) => (r || document).querySelector(s);
      const $$ = (s, r) => Array.from((r || document).querySelectorAll(s));

      /* ---- tabs (WAI-ARIA tabs pattern + arrow-key nav) ---- */
      const buttons = $$('[data-page-target]');
      const pages = $$('[data-page]');
      let currentTab = null;
      function show(name, focusTab) {
        if (name === currentTab && !focusTab) return;       // skip redundant scroll on re-click
        const changed = name !== currentTab;
        currentTab = name;
        pages.forEach(p => {
          const on = p.dataset.page === name;
          p.style.display = on ? '' : 'none';
        });
        buttons.forEach(b => {
          const active = b.dataset.pageTarget === name;
          b.classList.toggle('active', active);
          b.setAttribute('aria-selected', active ? 'true' : 'false');
          b.tabIndex = active ? 0 : -1;
          if (active && focusTab) b.focus();
        });
        if (changed) window.scrollTo({ top: 0, behavior: 'smooth' });
      }
      buttons.forEach((b, i) => {
        b.addEventListener('click', () => show(b.dataset.pageTarget));
        b.addEventListener('keydown', (e) => {
          let j = null;
          if (e.key === 'ArrowRight' || e.key === 'ArrowDown') j = (i + 1) % buttons.length;
          else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') j = (i - 1 + buttons.length) % buttons.length;
          else if (e.key === 'Home') j = 0;
          else if (e.key === 'End') j = buttons.length - 1;
          if (j !== null) { e.preventDefault(); show(buttons[j].dataset.pageTarget, true); }
        });
      });
      if (buttons.length) show('overview');

      /* ---- countdown + trip phase ---- */
      const DEPART = new Date('2026-12-18T21:00:00+09:00').getTime();
      const RETURN = new Date('2027-01-04T05:10:00+09:00').getTime();
      const PHASES = [
        { t: '2026-12-18T21:00:00+09:00', label: '인천 → 라스베이거스 비행 ✈' },
        { t: '2026-12-18T15:10:00-08:00', label: '라스베이거스 🎰' },
        { t: '2026-12-19T06:30:00-08:00', label: '그랜드캐년 투어 🏜' },
        { t: '2026-12-20T19:00:00-08:00', label: '라스베이거스 복귀 🎰' },
        { t: '2026-12-21T12:00:00-08:00', label: 'LA 경유 ① 🌴' },
        { t: '2026-12-22T23:25:00-08:00', label: 'LA → 칸쿤 비행 ✈' },
        { t: '2026-12-23T07:05:00-05:00', label: '칸쿤 · Hotel Xcaret Arte 🏖' },
        { t: '2026-12-28T15:00:00-05:00', label: '칸쿤 · Impression Moxché 🏖' },
        { t: '2027-01-01T19:10:00-05:00', label: '칸쿤 → LA 비행 ✈' },
        { t: '2027-01-01T21:40:00-08:00', label: 'LA 경유 ② 🌴' },
        { t: '2027-01-02T22:50:00-08:00', label: 'LA → 인천 비행 ✈ (귀국)' }
      ].map(p => ({ t: new Date(p.t).getTime(), label: p.label }));

      const cd = {
        status: $('#cdStatus'), days: $('#cdDays'), hours: $('#cdHours'),
        mins: $('#cdMins'), secs: $('#cdSecs'), phase: $('#cdPhase')
      };
      function pad(n) { return String(n).padStart(2, '0'); }
      function setUnits(ms) {
        if (ms < 0) ms = 0;
        const s = Math.floor(ms / 1000);
        if (cd.days)  cd.days.textContent  = Math.floor(s / 86400);
        if (cd.hours) cd.hours.textContent = pad(Math.floor((s % 86400) / 3600));
        if (cd.mins)  cd.mins.textContent  = pad(Math.floor((s % 3600) / 60));
        if (cd.secs)  cd.secs.textContent  = pad(s % 60);
      }
      function updateCountdown(now) {
        if (!cd.status) return;
        if (now < DEPART) {
          cd.status.textContent = '출발까지';
          setUnits(DEPART - now);
          cd.phase.innerHTML = '첫 일정 · <b>12.18 금 21:00 인천공항 ICN 출발</b>';
        } else if (now >= RETURN) {
          cd.status.textContent = '신혼여행 다녀온 지';   // 추억 모드: 경과 시간 카운트업
          setUnits(now - RETURN);
          cd.phase.innerHTML = '💛 <b>행복했던 우리의 신혼여행</b>';
        } else {
          cd.status.textContent = '여행 종료까지';
          setUnits(RETURN - now);
          let cur = '여행 중';
          for (const p of PHASES) { if (now >= p.t) cur = p.label; }
          cd.phase.innerHTML = '지금 · <b>' + cur + '</b>';
        }
      }

      /* ---- world clocks ---- */
      const clockEls = $$('[data-clock]');
      const dateEls = $$('[data-clockdate]');
      const timeFmt = {};
      const dateFmt = {};
      function fmtFor(tz, store, opts) {
        if (!store[tz]) store[tz] = new Intl.DateTimeFormat('ko-KR', Object.assign({ timeZone: tz }, opts));
        return store[tz];
      }
      function updateClocks(now) {
        clockEls.forEach(el => {
          el.textContent = fmtFor(el.dataset.clock, timeFmt, { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(now);
        });
        dateEls.forEach(el => {
          el.textContent = fmtFor(el.dataset.clockdate, dateFmt, { month: 'long', day: 'numeric', weekday: 'short' }).format(now);
        });
      }

      /* ---- single ticking timer ---- */
      if (window.__hmTimer) clearInterval(window.__hmTimer);
      function tick() { const now = Date.now(); updateCountdown(now); updateClocks(new Date(now)); }
      tick();
      window.__hmTimer = setInterval(tick, 1000);

      /* ---- packing checklist (localStorage) ---- */
      const CHK_KEY = 'honeymoon-checklist-v1';
      function loadChk() { try { return JSON.parse(localStorage.getItem(CHK_KEY) || '{}'); } catch (e) { return {}; } }
      function saveChk(s) { try { localStorage.setItem(CHK_KEY, JSON.stringify(s)); } catch (e) {} }
      const boxes = $$('[data-check]');
      function updateChkProgress() {
        const total = boxes.length, done = boxes.filter(b => b.checked).length;
        const pct = total ? Math.round(done / total * 100) : 0;
        const bar = $('#chkBar'); if (bar) bar.style.width = pct + '%';
        const p = $('#chkPct'); if (p) p.textContent = pct + '%';
        const c = $('#chkCount'); if (c) c.textContent = done + ' / ' + total;
      }
      if (boxes.length) {
        const state = loadChk();
        boxes.forEach(b => {
          const k = b.dataset.check;
          b.checked = !!state[k];
          const lab = b.closest('label'); if (lab) lab.classList.toggle('done', b.checked);
          b.addEventListener('change', () => {
            const s = loadChk(); s[k] = b.checked; saveChk(s);
            const l = b.closest('label'); if (l) l.classList.toggle('done', b.checked);
            updateChkProgress();
          });
        });
        updateChkProgress();
      }

      /* ---- currency converter (editable rates persisted) ---- */
      const FX_KEY = 'honeymoon-fx-v1';
      const rateEls = $$('[data-fx-rate]');
      if (rateEls.length) {
        let saved = {}; try { saved = JSON.parse(localStorage.getItem(FX_KEY) || '{}'); } catch (e) {}
        rateEls.forEach(r => { const k = r.dataset.fxRate; if (saved[k] != null) r.value = saved[k]; });
        function recomputeFx() {
          const store = {};
          rateEls.forEach(r => {
            const k = r.dataset.fxRate; store[k] = r.value;
            const amtEl = $('[data-fx-amt="' + k + '"]');
            const outEl = $('[data-fx-out="' + k + '"]');
            const rate = parseFloat(r.value) || 0;
            const amt = amtEl ? (parseFloat(amtEl.value) || 0) : 0;
            if (outEl) outEl.textContent = '≈ ' + Math.round(rate * amt).toLocaleString('ko-KR') + ' 원';
          });
          try { localStorage.setItem(FX_KEY, JSON.stringify(store)); } catch (e) {}
        }
        $$('[data-fx-rate],[data-fx-amt]').forEach(el => el.addEventListener('input', recomputeFx));
        recomputeFx();
      }

      /* ---- copy reservation codes ---- */
      $$('[data-copy]').forEach(el => {
        el.setAttribute('title', '탭하면 복사');
        el.setAttribute('role', 'button');
        el.setAttribute('tabindex', '0');
        const doCopy = async () => {
          const text = el.getAttribute('data-copy') || el.textContent.trim();
          try { await navigator.clipboard.writeText(text); }
          catch (e) {
            const r = document.createRange(); r.selectNodeContents(el);
            const s = window.getSelection(); s.removeAllRanges(); s.addRange(r);
          }
          if (el.__busy) return;
          el.__busy = true;
          const old = el.textContent;
          el.textContent = '복사됨 ✓'; el.classList.add('copied');
          setTimeout(() => { el.textContent = old; el.classList.remove('copied'); el.__busy = false; }, 1100);
        };
        el.addEventListener('click', doCopy);
        el.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); doCopy(); } });
      });

      /* ---- toolbar actions ---- */
      $$('[data-action="print"]').forEach(b => b.addEventListener('click', () => window.print()));
      $$('[data-action="reset-checklist"]').forEach(b => b.addEventListener('click', () => {
        try { localStorage.removeItem(CHK_KEY); } catch (e) {}
        boxes.forEach(x => { x.checked = false; const l = x.closest('label'); if (l) l.classList.remove('done'); });
        updateChkProgress();
      }));
    };
  </script>
</body>
</html>
